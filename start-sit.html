<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start / Sit Calculator</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="start-sit.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="start-sit.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  


</head>
<body>

  <h1>Start / Sit Calculator</h1>

  <!-- NAVBAR -->
  <div id="nav">
      <ul id="navbar">
          <li id="link"><a href="home.html">Home</a></li>
          <li id="link"><a href="start-sit.html">Start-Sit</a></li>
          <li id="link"><a href="about.html">About</a></li>
      </ul>
  </div>

  <!-- Select Players to Compare -->
  <div id="box">
    <div id="select-players">

      <div class="select-group">
        <input type="text" id="search-a" placeholder="Search Player" oninput="filterSelect('select-a', this.value)" />
        <select id="select-a">
          <option value="">Select Player</option>
        </select>
      </div>

      <div class="select-group">
        <input type="text" id="search-b" placeholder="Search Player" oninput="filterSelect('select-b', this.value)" />
        <select id="select-b">
          <option value="">Select Player</option>
        </select>
      </div>

    </div>
  </div>

  <!-- Button to calculate who to start/sit -->
  <div id="box">
    <button id="calculate" onclick="compare()">Calculate</button>
  </div>

  <!-- Div to display loading when calling API -->
  <div id="loading">Loading player data…</div>

  <!-- Div to be displayed after player stats are done -->
  <div id="player-box" style="display:none">
    <div id="player-a" class="card"></div>
    <div id="player-b" class="card"></div>
  </div>

  <!-- Section that shows recommendation of who to start -->
  <div id="recommendation"></div>

</body>
</html>
